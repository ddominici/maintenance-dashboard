app:
  name: maintenance-dashboard
  env: development
  host: 0.0.0.0
  port: 8080
  read_timeout_seconds: 15
  write_timeout_seconds: 15
  idle_timeout_seconds: 60

# Sensitive fields (auth.password, database username/password) can be stored encrypted.
# Encrypted values use the format:  enc:<base64-ciphertext>
# The encryption key must be set via the ENCRYPTION_KEY environment variable as a
# 32-byte value encoded as 64 hex chars (e.g. openssl rand -hex 32) or base64.
#
# To generate an encrypted value:
#   ENCRYPTION_KEY=<your-key> ./maintenance-dashboard encrypt "my-secret"
#
# Plain-text values continue to work when ENCRYPTION_KEY is not set.

auth:
  enabled: true
  username: admin
  # Plain-text or encrypted, e.g.: enc:6T9...==
  password: change-me

# Multiple servers — each entry is selectable from the UI dropdown.
# mode: sql or integrated. When "integrated", username and password are ignored.
# For a single server you can still use the legacy "database:" key (auto-migrated).
servers:
  - name: production
    database:
      mode: sql
      host: prod-server
      port: 1433
      instance: ""
      name: MaintenanceDB
      # Plain-text or encrypted, e.g.: enc:6T9...==
      username: sa
      password: your-password
      encrypt: false
      trust_server_certificate: true
      connection_timeout_seconds: 10
      max_open_conns: 20
      max_idle_conns: 10
      conn_max_lifetime_minutes: 30
  - name: staging
    database:
      mode: sql
      host: staging-server
      port: 1433
      instance: ""
      name: MaintenanceDB
      # Plain-text or encrypted, e.g.: enc:6T9...==
      username: sa
      password: your-password
      encrypt: false
      trust_server_certificate: true
      connection_timeout_seconds: 10
      max_open_conns: 10
      max_idle_conns: 5
      conn_max_lifetime_minutes: 30

# Legacy single-server format (still supported, auto-converted to a "default" server entry):
# database:
#   mode: sql
#   host: localhost
#   port: 1433
#   instance: ""
#   name: MaintenanceDB
#   username: sa
#   password: your-password
#   encrypt: false
#   trust_server_certificate: true
#   connection_timeout_seconds: 10
#   max_open_conns: 20
#   max_idle_conns: 10
#   conn_max_lifetime_minutes: 30

cache:
  enabled: true
  default_ttl_seconds: 60
  dashboard_ttl_seconds: 30
  detail_ttl_seconds: 60
  filters_ttl_seconds: 300
  cleanup_interval_seconds: 60

ui:
  default_language: en
  supported_languages:
    - en
    - it
